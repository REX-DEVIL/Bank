<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐁𝐀𝐍𝐊</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
        }

        html {
            min-height: 100%;
            height: 100%;
        }

        body {
            background: linear-gradient(145deg, #1a0f1f 0%, #2d1b33 100%);
            min-height: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
            margin: 0;
            background-attachment: fixed;
        }

        /* Fixed background that never shows white */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(145deg, #1a0f1f 0%, #2d1b33 100%);
            z-index: -1;
        }

        .bank-card {
            max-width: 950px;
            width: 100%;
            background: rgba(46, 30, 52, 0.75);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 48px;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(180, 130, 200, 0.2);
            border: 1px solid rgba(200, 150, 220, 0.15);
            transition: all 0.2s ease;
            position: relative;
            margin: 0 auto;
        }

        /* Hero Section */
        .hero-section {
            position: relative;
            border-radius: 32px;
            overflow: hidden;
            margin-bottom: 1.5rem;
            border: 3px solid #b47ad9;
            box-shadow: 0 0 20px rgba(180, 130, 220, 0.3), inset 0 0 20px rgba(180, 130, 220, 0.1);
            animation: borderPulse 3s ease-in-out infinite;
        }

        @keyframes borderPulse {
            0%, 100% {
                border-color: #b47ad9;
                box-shadow: 0 0 20px rgba(180, 130, 220, 0.3), inset 0 0 20px rgba(180, 130, 220, 0.1);
            }
            50% {
                border-color: #d9b0ff;
                box-shadow: 0 0 40px rgba(180, 130, 220, 0.6), inset 0 0 40px rgba(180, 130, 220, 0.2);
            }
        }

        .hero-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .hero-image:hover {
            transform: scale(1.02);
        }

        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(26, 15, 31, 0.9));
            padding: 2rem 2rem 1.5rem;
            text-align: center;
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f0e6f5;
            text-shadow: 0 0 30px rgba(180, 130, 220, 0.5);
            letter-spacing: 2px;
            background: linear-gradient(135deg, #d9b0ff, #b47ad9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
        }

        /* Music Controls - Now below hero */
        .music-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(25, 15, 30, 0.6);
            backdrop-filter: blur(4px);
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            margin-bottom: 1rem;
            border: 1px solid rgba(180, 130, 220, 0.15);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .music-controls .music-label {
            color: #a583b9;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }

        .music-controls .music-label i {
            color: #b47ad9;
            font-size: 1.2rem;
        }

        .music-btn {
            background: linear-gradient(135deg, #8f5bb0, #6d3f8a);
            border: none;
            color: white;
            padding: 0.6rem 1.8rem;
            border-radius: 60px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(100, 40, 140, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            border: 1px solid rgba(200, 150, 230, 0.2);
            white-space: nowrap;
        }

        .music-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(100, 40, 140, 0.5);
            background: linear-gradient(135deg, #a16fc4, #7d4f9e);
        }

        .music-btn:active {
            transform: scale(0.95);
        }

        .music-btn.playing {
            background: linear-gradient(135deg, #6d3f8a, #4a2a5e);
            border-color: rgba(200, 150, 230, 0.3);
        }

        .music-btn.paused {
            background: linear-gradient(135deg, #8f5bb0, #6d3f8a);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 4px 15px rgba(100, 40, 140, 0.3);
            }
            50% {
                box-shadow: 0 4px 30px rgba(100, 40, 140, 0.6);
            }
        }

        /* Shop Button - New */
        .shop-btn-container {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .shop-btn {
            display: inline-block;
            background: linear-gradient(135deg, #d9b0ff, #b47ad9);
            color: #1a0f1f;
            padding: 0.9rem 3rem;
            border-radius: 60px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(180, 130, 220, 0.4);
            border: 2px solid rgba(200, 150, 230, 0.3);
            width: 100%;
            text-align: center;
        }

        .shop-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 35px rgba(180, 130, 220, 0.6);
            background: linear-gradient(135deg, #e6c4ff, #c49ae0);
        }

        .shop-btn:active {
            transform: scale(0.97);
        }

        .shop-btn i {
            margin-left: 0.8rem;
        }

        .bank-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid rgba(180, 130, 220, 0.3);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .bank-header h1 {
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #d9b0ff, #b47ad9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(180, 100, 220, 0.3);
        }

        .bank-header i {
            color: #c9a0e0;
            font-size: 2rem;
            opacity: 0.7;
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.9rem 1.5rem 0.9rem 3.5rem;
            border-radius: 60px;
            border: 2px solid rgba(180, 130, 220, 0.3);
            background: rgba(25, 15, 30, 0.6);
            backdrop-filter: blur(4px);
            color: #f0e6f5;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            outline: none;
            direction: rtl;
        }

        .search-input::placeholder {
            color: #a583b9;
            font-size: 1rem;
        }

        .search-input:focus {
            border-color: #b47ad9;
            box-shadow: 0 0 20px rgba(180, 130, 220, 0.2);
            background: rgba(35, 20, 42, 0.8);
        }

        .search-icon {
            position: absolute;
            right: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #b47ad9;
            font-size: 1.2rem;
            pointer-events: none;
        }

        .search-clear {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #a583b9;
            cursor: pointer;
            font-size: 1rem;
            display: none;
            transition: color 0.3s;
        }

        .search-clear:hover {
            color: #ff6b6b;
        }

        .search-clear.visible {
            display: block;
        }

        .search-results-count {
            color: #a583b9;
            font-size: 0.9rem;
            padding: 0.3rem 0.8rem;
            background: rgba(180, 130, 220, 0.1);
            border-radius: 20px;
            white-space: nowrap;
            border: 1px solid rgba(180, 130, 220, 0.1);
        }

        .list-container {
            background: rgba(25, 15, 30, 0.5);
            border-radius: 32px;
            padding: 0.25rem 0.25rem;
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.5);
            min-height: 200px;
        }

        .bank-list {
            list-style: none;
            padding: 0.5rem 0.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .bank-list li {
            background: rgba(60, 38, 70, 0.6);
            backdrop-filter: blur(2px);
            border-radius: 60px;
            padding: 0.9rem 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid #b47ad9;
            border-right: 1px solid rgba(200, 150, 220, 0.2);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            transition: all 0.15s ease;
            color: #f0e6f5;
            font-size: 1.2rem;
            font-weight: 400;
        }

        .bank-list li:hover {
            background: rgba(80, 50, 95, 0.7);
            transform: scale(1.01);
            border-left-width: 10px;
            border-left-color: #d9b0ff;
            box-shadow: 0 8px 18px rgba(120, 60, 160, 0.3);
        }

        .bank-list li .title {
            font-weight: 500;
            color: #d4b0e8;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .bank-list li .title i {
            color: #b47ad9;
            font-size: 1.2rem;
            width: 1.8rem;
        }

        .bank-list li .amount {
            background: rgba(180, 130, 220, 0.15);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            color: #f2daff;
            border: 1px solid rgba(200, 150, 230, 0.2);
            letter-spacing: 0.3px;
            box-shadow: inset 0 0 8px rgba(160, 100, 200, 0.2);
        }

        .bank-list li.hidden {
            display: none;
        }

        .empty-message {
            text-align: center;
            color: #b494c9;
            padding: 2.5rem 1rem;
            font-size: 1.4rem;
            background: rgba(30, 18, 36, 0.4);
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }

        .empty-message i {
            margin-left: 0.8rem;
            color: #9f7ab9;
        }

        .bank-footer {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(180, 130, 220, 0.15);
            padding-top: 1.2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .footer-left {
            color: #a583b9;
            font-size: 0.9rem;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .footer-left i {
            color: #b47ad9;
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 5, 12, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.4s ease;
        }

        .popup-box {
            max-width: 480px;
            width: 90%;
            background: #281e2e;
            background: linear-gradient(145deg, #2e1f35, #1f1425);
            border-radius: 60px;
            padding: 2.5rem 2rem 2rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px #7f5299;
            text-align: center;
            border: 1px solid rgba(200, 150, 230, 0.25);
            animation: slideUp 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }

        .popup-box i {
            font-size: 3.2rem;
            color: #b47ad9;
            margin-bottom: 0.8rem;
            display: inline-block;
            filter: drop-shadow(0 0 12px #a06bc0);
        }

        .popup-box h2 {
            color: #e2cef0;
            font-weight: 400;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            letter-spacing: 0.3px;
        }

        .popup-box p {
            color: #c9b0db;
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.8rem 1.2rem;
            border-radius: 40px;
            border-right: 3px solid #a06bc0;
        }

        .popup-btn {
            background: linear-gradient(135deg, #8f5bb0, #6d3f8a);
            border: none;
            color: white;
            font-size: 1.6rem;
            font-weight: 500;
            padding: 0.9rem 2.8rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(100, 40, 140, 0.5);
            transition: all 0.2s ease;
            letter-spacing: 1px;
            border: 1px solid #b47ad9;
            width: 100%;
            max-width: 220px;
        }

        .popup-btn:hover {
            background: linear-gradient(135deg, #a16fc4, #7d4f9e);
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(130, 60, 180, 0.6);
            border-color: #d9b0ff;
        }

        .popup-btn:active {
            transform: scale(0.96);
        }

        .loading-spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes slideUp {
            0% { transform: translateY(30px) scale(0.96); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Mobile Responsive */
        @media (max-width: 700px) {
            .bank-card { padding: 1.5rem 1rem; }
            .bank-header h1 { font-size: 1.8rem; }
            .bank-list li { padding: 0.7rem 1.2rem; font-size: 1rem; flex-wrap: wrap; gap: 0.3rem; }
            .bank-list li .amount { padding: 0.2rem 0.9rem; }
            .popup-box { padding: 2rem 1.5rem; }
            .popup-box p { font-size: 0.95rem; }
            .hero-image { height: 150px; }
            .hero-title { font-size: 1.8rem; }
            .search-container { flex-wrap: wrap; }
            .search-results-count { width: 100%; text-align: center; }
            .music-controls { flex-direction: column; align-items: stretch; }
            .music-btn { justify-content: center; }
            .music-controls .music-label { justify-content: center; }
            .bank-footer { flex-direction: column; align-items: stretch; }
            .footer-left { justify-content: center; }
            .shop-btn { padding: 0.8rem 2rem; font-size: 1.1rem; }
        }

        /* Extra small screens */
        @media (max-width: 480px) {
            body { padding: 1rem 0.5rem; }
            .bank-card { padding: 1rem 0.8rem; border-radius: 32px; }
            .hero-image { height: 120px; }
            .hero-title { font-size: 1.4rem; }
            .bank-header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <!-- Popup Overlay (Music consent) -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-box">
            <i class="fas fa-headphones-alt"></i>
            <h2>مرحباً </h2>
            <p>
                بضغط على زر 'استمرار' فأنت تقبل تشغيل الموسيقى في الخلفية (يمكنك إطفائه لاحقا)
            </p>
            <button class="popup-btn" id="continueBtn">استمرار</button>
        </div>
    </div>

    <!-- Main website content -->
    <div class="bank-card">
        <!-- Hero Section -->
        <div class="hero-section">
            <img src="https://i.pinimg.com/736x/45/9c/e8/459ce8adda6cebf00d4cb249a38d72b2.jpg" alt="BANK Hero" class="hero-image">
            <div class="hero-overlay">
                <div class="hero-title">❥ 𝐁𝐀𝐍𝐊 ✎</div>
            </div>
        </div>

        <!-- Music Controls - Directly below Hero -->
        <div class="music-controls">
            <div class="music-label">
                <i class="fas fa-music"></i>
                <span>تحكم بالموسيقى |𝘿𝙀𝙓𝙏𝙀𝙍|</span>
            </div>
            <button class="music-btn playing" id="musicToggle">
                <i class="fas fa-music"></i>
                <span id="musicBtnText">♫ تشغيل</span>
            </button>
        </div>

        <!-- Shop Button - NEW -->
        <div class="shop-btn-container">
            <a href="shop.html" class="shop-btn">
                <i class="fas fa-store"></i>
                🛒 الذهاب إلى المتجر
            </a>
        </div>

        <div class="bank-header">
            <h1><i class="fas fa-university" style="margin-left: 0.8rem; color: #b47ad9;"></i>البــــــــــــــنــــك</h1>
            <i class="fas fa-coins"></i>
        </div>

        <!-- Search Bar -->
        <div class="search-container">
            <div class="search-input-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 ابحث عن لقب...">
                <span class="search-clear" id="searchClear">✕</span>
            </div>
            <span class="search-results-count" id="resultsCount">0 عنصر</span>
        </div>

        <div class="list-container">
            <ul class="bank-list" id="bankList">
                <li class="empty-message">
                    <i class="fas fa-spinner loading-spinner"></i> جاري التحميل...
                </li>
            </ul>
        </div>

        <div class="bank-footer">
            <div class="footer-left">
                <i class="fas fa-coins"></i> 
                <span>© 2026 BANK - جميع الحقوق محفوظة</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // --- عناصر DOM ---
            const popup = document.getElementById('popupOverlay');
            const continueBtn = document.getElementById('continueBtn');
            const bankList = document.getElementById('bankList');
            const musicToggle = document.getElementById('musicToggle');
            const musicBtnText = document.getElementById('musicBtnText');
            const searchInput = document.getElementById('searchInput');
            const searchClear = document.getElementById('searchClear');
            const resultsCount = document.getElementById('resultsCount');

            // --- متغيرات البيانات ---
            let allItems = [];
            let filteredItems = [];

            // --- متغيرات الصوت ---
            let audio = null;
            let musicStarted = false;
            let isPlaying = false;
            let musicLoadAttempts = 0;
            const MAX_MUSIC_ATTEMPTS = 3;

            // --- دالة تشغيل الموسيقى مع التكرار التلقائي ---
            function startMusic() {
                if (musicStarted) return;
                
                musicLoadAttempts++;

                try {
                    const musicPath = 'Music.mp3';
                    audio = new Audio(musicPath);
                    audio.loop = true;
                    audio.volume = 0.4;
                    
                    audio.addEventListener('canplaythrough', function() {
                    });

                    audio.addEventListener('error', function(e) {
                        console.error('❌ خطأ في تحميل الملف الصوتي:', e);
                        if (musicLoadAttempts < MAX_MUSIC_ATTEMPTS) {
                            setTimeout(() => {
                                tryAlternativeMusicPath();
                            }, 500);
                        } else {
                            updateMusicButton(false);
                            showMusicError();
                        }
                    });

                    audio.play().then(() => {
                        musicStarted = true;
                        isPlaying = true;
                        updateMusicButton(true);
                    }).catch((err) => {
                        console.warn('⚠️ فشل تشغيل الموسيقى: ', err);
                        if (musicLoadAttempts < MAX_MUSIC_ATTEMPTS) {
                            setTimeout(() => {
                                tryAlternativeMusicPath();
                            }, 500);
                        } else {
                            updateMusicButton(false);
                            showMusicError();
                        }
                    });

                } catch (e) {
                    console.warn('⚠️ مشكلة في إنشاء كائن الصوت:', e);
                    if (musicLoadAttempts < MAX_MUSIC_ATTEMPTS) {
                        setTimeout(() => {
                            tryAlternativeMusicPath();
                        }, 500);
                    } else {
                        updateMusicButton(false);
                        showMusicError();
                    }
                }
            }

            // --- محاولة استخدام مسار بديل للموسيقى ---
            function tryAlternativeMusicPath() {
                if (musicStarted) return;
                
                try {
                    const alternativePaths = [
                        './Music.mp3',
                        '../Music.mp3',
                        '/Music.mp3',
                        'Music.mp3?t=' + Date.now()
                    ];
                    
                    const pathIndex = musicLoadAttempts - 1;
                    if (pathIndex < alternativePaths.length) {
                        const path = alternativePaths[pathIndex];
                        
                        audio = new Audio(path);
                        audio.loop = true;
                        audio.volume = 0.4;
                        
                        audio.play().then(() => {
                            musicStarted = true;
                            isPlaying = true;
                            updateMusicButton(true);
                        }).catch(() => {
                            if (musicLoadAttempts < MAX_MUSIC_ATTEMPTS) {
                                musicLoadAttempts++;
                                tryAlternativeMusicPath();
                            } else {
                                updateMusicButton(false);
                                showMusicError();
                            }
                        });
                    }
                } catch (e) {
                    console.warn('⚠️ فشل في محاولة المسار البديل:', e);
                }
            }

            // --- عرض رسالة خطأ في الموسيقى ---
            function showMusicError() {
                console.warn('⚠️ تعذر تشغيل الموسيقى بعد عدة محاولات');
                musicBtnText.textContent = '❌ تعذر التشغيل';
            }

            // --- تحديث زر الموسيقى ---
            function updateMusicButton(playing) {
                if (!musicToggle) return;
                const icon = musicToggle.querySelector('i');
                if (playing) {
                    musicToggle.className = 'music-btn playing';
                    icon.className = 'fas fa-music';
                    musicBtnText.textContent = '♫ تشغيل';
                } else {
                    musicToggle.className = 'music-btn paused';
                    icon.className = 'fas fa-pause-circle';
                    musicBtnText.textContent = '⏸ إيقاف';
                }
            }

            // --- تبديل حالة الموسيقى ---
            function toggleMusic() {
                if (!audio) {
                    startMusic();
                    return;
                }
                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                    updateMusicButton(false);
                } else {
                    audio.play().then(() => {
                        isPlaying = true;
                        updateMusicButton(true);
                    }).catch(err => {
                        console.warn('⚠️ فشل استئناف التشغيل', err);
                        if (!musicStarted) {
                            startMusic();
                        }
                    });
                }
            }

            // --- إغلاق النافذة المنبثقة وبدء الموسيقى ---
            function handleConsent() {
                if (popup) popup.style.display = 'none';
                setTimeout(() => {
                    startMusic();
                }, 200);
            }

            // --- ربط الأزرار ---
            if (continueBtn) {
                continueBtn.addEventListener('click', handleConsent);
            }

            if (musicToggle) {
                musicToggle.addEventListener('click', toggleMusic);
            }

            // --- دالة تحليل النص ---
            function parseBankData(text) {
                const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
                const result = [];
                let current = {};

                for (let line of lines) {
                    const titleMatch = line.match(/Title\s*:\s*(.+)/);
                    const moneyMatch = line.match(/Money\s*:\s*(.+)/);
                    
                    if (titleMatch) {
                        if (current.Title && current.Money !== undefined) {
                            result.push({ Title: current.Title.trim(), Money: current.Money.trim() });
                        }
                        current = { Title: titleMatch[1].trim(), Money: '' };
                    } else if (moneyMatch) {
                        if (current.Title) {
                            current.Money = moneyMatch[1].trim();
                            result.push({ Title: current.Title, Money: current.Money });
                            current = {};
                        } else {
                            result.push({ Title: 'غير معروف', Money: moneyMatch[1].trim() });
                        }
                    }
                }

                if (current.Title && current.Money !== undefined) {
                    result.push({ Title: current.Title, Money: current.Money });
                } else if (current.Title && current.Money === undefined) {
                    result.push({ Title: current.Title, Money: '0' });
                }

                return result;
            }

            // --- دالة عرض القائمة ---
            function renderList(items) {
                if (!bankList) return;

                if (!items || items.length === 0) {
                    bankList.innerHTML = `
                        <li class="empty-message">
                            <i class="fas fa-database"></i> 
                            لا توجد بيانات في Bank.txt
                        </li>
                    `;
                    return;
                }

                let html = '';
                items.forEach((item, index) => {
                    const title = item.Title || 'بدون لقب';
                    const money = item.Money || '0';
                    const icon = index % 2 === 0 ? 'fa-user-circle' : 'fa-user-astronaut';
                    html += `
                        <li data-title="${title.toLowerCase()}">
                            <span class="title">
                                <i class="fas ${icon}"></i> 
                                ${title}
                            </span>
                            <span class="amount">
                                <i class="fas fa-coins" style="margin-left: 0.4rem; color: #d9b0ff;"></i>
                                ${money}
                            </span>
                        </li>
                    `;
                });

                bankList.innerHTML = html;
                allItems = items;
                filteredItems = items;
                updateResultsCount(items.length);
            }

            // --- تحديث عدد النتائج ---
            function updateResultsCount(count) {
                if (resultsCount) {
                    resultsCount.textContent = `${count} عنصر`;
                }
            }

            // --- دالة البحث ---
            function filterItems(searchTerm) {
                if (!searchTerm || searchTerm.trim() === '') {
                    const items = bankList.querySelectorAll('li');
                    items.forEach(li => {
                        li.classList.remove('hidden');
                    });
                    filteredItems = allItems;
                    updateResultsCount(allItems.length);
                    searchClear.classList.remove('visible');
                    return;
                }

                const term = searchTerm.trim().toLowerCase();
                const items = bankList.querySelectorAll('li[data-title]');
                let visibleCount = 0;

                items.forEach(li => {
                    const title = li.getAttribute('data-title');
                    if (title && title.includes(term)) {
                        li.classList.remove('hidden');
                        visibleCount++;
                    } else {
                        li.classList.add('hidden');
                    }
                });

                filteredItems = allItems.filter(item => 
                    item.Title && item.Title.toLowerCase().includes(term)
                );
                updateResultsCount(visibleCount);
                searchClear.classList.add('visible');
            }

            // --- البحث مع تأخير (debounce) ---
            let searchTimeout;
            function handleSearch(e) {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    filterItems(e.target.value);
                }, 300);
            }

            // --- مسح البحث ---
            function clearSearch() {
                searchInput.value = '';
                filterItems('');
                searchInput.focus();
            }

            // --- ربط أحداث البحث ---
            if (searchInput) {
                searchInput.addEventListener('input', handleSearch);
                searchInput.addEventListener('keyup', function(e) {
                    if (e.key === 'Escape') {
                        clearSearch();
                    }
                });
            }

            if (searchClear) {
                searchClear.addEventListener('click', clearSearch);
            }

            // --- تحميل البيانات من Bank.txt ---
            function loadBankData() {
                fetch('Bank.txt')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        return response.text();
                    })
                    .then(text => {
                        const items = parseBankData(text);
                        renderList(items);
                    })
                    .catch((error) => {
                        console.error('❌ فشل تحميل Bank.txt:', error);
                        bankList.innerHTML = `
                            <li class="empty-message" style="color:#d4a0d0;">
                                <i class="fas fa-exclamation-triangle"></i> 
                                تعذر تحميل Bank.txt<br>
                                <small style="font-size:0.8rem; color:#a583b9;">
                                    تأكد من وجود الملف في نفس المجلد
                                </small>
                                <br>
                                <small style="font-size:0.7rem; color:#a583b9; display:block; margin-top:0.5rem;">
                                    الصيغة المطلوبة:<br>
                                    Title : اوروتشيمارو<br>
                                    Money : 999K
                                </small>
                            </li>
                        `;
                    });
            }

            // --- بدء تحميل البيانات ---
            loadBankData();

            // --- التحقق من وجود النافذة المنبثقة ---
            if (!popup) {
                console.warn('⚠️ لم يتم العثور على عنصر النافذة المنبثقة');
                startMusic();
            }

        })();
    </script>
</body>
</html>
